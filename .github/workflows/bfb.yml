# Wrap a published DPU disk image into a BlueField-2 .bfb (plan §7).
#
# Separate, on-demand workflow_dispatch (NOT part of the scheduled nightly):
# the .bfb can only be boot-validated on real BF2 hardware, so it is produced
# deliberately, not on every nightly. The ASSEMBLY, however, runs and is
# checkable in CI (does mlx-mkbfb emit a .bfb from our disk image + NVIDIA
# boot images?).
#
# mlxbf-bootimages are per BlueField GENERATION (BF2), not per board -- one
# package serves every BF2 card (NVIDIA ships one BFB per platform per DOCA
# release). So doca_repo just pins a recent BF2 boot-image set; there is no
# board-specific input.
#
# What it does: pull the DPU qcow2 from a nightly Release -> extract the
# kernel Image + modules from it -> build the installer initramfs
# (dozenos-rebrand-arm64/bfb/create-installer-initramfs.sh) -> pack with
# NVIDIA default.bfb via mlx-mkbfb (bfb/make-bfb.sh) -> upload the .bfb to the
# same Release.
name: Build BF2 BFB

on:
  # Auto-chain: after the nightly publishes a release (with the dpu qcow2),
  # wrap it into a .bfb on the same release. So a fresh kernel/disk flows all
  # the way to a bootable BFB overnight without a manual step.
  workflow_run:
    workflows: ["DozenOS arm64 nightly build"]
    types: [completed]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag whose dpu qcow2 to wrap (blank = latest).'
        required: false
        type: string
      doca_repo:
        description: 'NVIDIA DOCA apt source line providing rshim (ships mlx-mkbfb).'
        required: true
        default: 'deb [trusted=yes] https://linux.mellanox.com/public/repo/doca/3.4.0/debian12/arm64-sbsa/ ./'
        type: string
      bootimages_url:
        description: 'URL of the mlxbf-bootimages(-signed) arm64 .deb (provides default.bfb + capsule). Per BF2 generation, not per board. Pin a recent DOCA build so a push does not downgrade the DPU firmware (a 4.11 base was seen to revert a 4.15 board).'
        required: true
        default: 'https://linux.mellanox.com/public/repo/doca/3.4.0/debian13/arm64-dpu/mlxbf-bootimages-signed_4.15.0-13977_arm64.deb'
        type: string

permissions:
  contents: write

concurrency:
  group: build-bfb
  cancel-in-progress: false

jobs:
  build-bfb:
    # On workflow_run only proceed if the nightly succeeded; always run on manual
    # dispatch. (workflow_run carries no inputs, so the steps fall back to the
    # workflow_dispatch defaults below.)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    env:
      DOCA_REPO: ${{ inputs.doca_repo || 'deb [trusted=yes] https://linux.mellanox.com/public/repo/doca/3.4.0/debian12/arm64-sbsa/ ./' }}
      BOOTIMAGES_URL: ${{ inputs.bootimages_url || 'https://linux.mellanox.com/public/repo/doca/3.4.0/debian13/arm64-dpu/mlxbf-bootimages-signed_4.15.0-13977_arm64.deb' }}
    steps:
      - name: Checkout dozenos-rebrand-arm64 (bfb/ scripts)
        uses: actions/checkout@v7
        with:
          repository: dozenos/dozenos-rebrand-arm64
          path: rebrand-arm64

      - name: Install host tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y qemu-utils zstd busybox-static cpio gzip \
            gdisk kpartx ca-certificates wget efibootmgr

      # Two public NVIDIA sources (both per BF2 generation, not per board):
      #  - mlx-mkbfb ships in the DOCA repo's `rshim` package (/usr/sbin).
      #  - default.bfb (+ capsule) ships in the mlxbf-bootimages-signed .deb
      #    under the bluefield repo, fetched directly and dpkg -i'd.
      # [trusted=yes] avoids a key dance for a first bring-up.
      - name: Install mlx-mkbfb (DOCA rshim) + default.bfb (mlxbf-bootimages)
        run: |
          set -euo pipefail
          echo "$DOCA_REPO" | sudo tee /etc/apt/sources.list.d/doca.list
          sudo apt-get update
          sudo apt-get install -y rshim
          MKBFB=$(command -v mlx-mkbfb || echo /usr/sbin/mlx-mkbfb)
          test -x "$MKBFB" || { echo "::error::mlx-mkbfb not found in the DOCA rshim package"; exit 1; }
          echo "MKBFB=$MKBFB" >> "$GITHUB_ENV"

          wget -qO bootimages.deb "$BOOTIMAGES_URL"
          sudo dpkg -i bootimages.deb || sudo apt-get -y -f install
          test -f /lib/firmware/mellanox/boot/default.bfb \
            || { echo "::error::default.bfb not found after installing mlxbf-bootimages"; exit 1; }

      - name: Download the DPU qcow2 from the Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.release_tag }}"
          [ -n "$TAG" ] || TAG=$(gh release list -R "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName')
          echo "I: wrapping release $TAG"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          # A nightly that the change-gate skipped still reports success, so the
          # workflow_run chain fires and would re-wrap a release that already
          # has its .bfb. Nothing breaks (the upload is --clobber) but it costs
          # a runner for no new bits, so stop here instead. A manual dispatch
          # always proceeds -- that is how you rebuild a .bfb deliberately.
          if [ "${{ github.event_name }}" = "workflow_run" ] \
             && gh release view "$TAG" -R "${{ github.repository }}" \
                  --json assets --jq '[.assets[].name]|join(" ")' | grep -q -- '-bf2.bfb'; then
            echo "I: release $TAG already carries a .bfb and this run was auto-chained -- nothing to do"
            echo "SKIP=1" >> "$GITHUB_ENV"
            exit 0
          fi
          gh release download "$TAG" -R "${{ github.repository }}" \
            --pattern '*-dpu-arm64.qcow2' --dir .
          qcow=$(ls ./*-dpu-arm64.qcow2)
          echo "QCOW=$qcow" >> "$GITHUB_ENV"

      # Pull the kernel Image + /lib/modules out of the disk image: connect the
      # qcow2 via qemu-nbd, mount the root partition, then the VyOS live
      # squashfs it carries, and copy vmlinuz + modules for the installer
      # initramfs.
      - name: Extract kernel Image + modules from the qcow2
        if: env.SKIP != '1'
        run: |
          set -euo pipefail
          sudo modprobe nbd max_part=16
          sudo qemu-nbd --connect=/dev/nbd0 "$QCOW"
          sudo partx -a /dev/nbd0 2>/dev/null || sudo partprobe /dev/nbd0 || true
          for _ in $(seq 1 10); do ls /dev/nbd0p* >/dev/null 2>&1 && break; sleep 1; done
          mkdir -p mnt

          # VyOS installed layout (raw_image.py install_image): the root
          # partition has boot/<DOZENOS-VERSION>/ holding the copied squashfs
          # /boot/* files (vmlinuz-<KVER>, initrd, ...) plus <version>.squashfs.
          # NOTE: the boot dir name is the DozenOS VERSION, not the kernel
          # version; the kernel version comes from the vmlinuz-<KVER> filename
          # and is what /lib/modules/<KVER> uses. Probe every partition.
          imgdir="" vmlz=""
          for part in /dev/nbd0p*; do
            sudo mount "$part" mnt 2>/dev/null || continue
            for d in mnt/boot/*/; do
              for v in "$d"vmlinuz-*; do
                [ -f "$v" ] || continue
                imgdir="$d"; vmlz="$v"; break
              done
              [ -n "$vmlz" ] && break
            done
            [ -n "$vmlz" ] && break
            sudo umount mnt
          done
          if [ -z "$vmlz" ]; then
            echo "::error::no boot/*/vmlinuz-* found in any partition. Layout dump:"
            for part in /dev/nbd0p*; do echo "-- $part --"; sudo mount "$part" mnt 2>/dev/null && { sudo find mnt -maxdepth 3 -name 'vmlinuz*' -o -maxdepth 3 -name '*.squashfs' 2>/dev/null; sudo ls -la mnt mnt/boot 2>/dev/null; sudo umount mnt; }; done
            exit 1
          fi
          KVER=$(basename "$vmlz" | sed 's/^vmlinuz-//')
          echo "I: kernel version: $KVER ; image boot dir: $imgdir"

          # The BFB kernel MUST be the UNCOMPRESSED arm64 Image (PE/EFI header:
          # "MZ" at 0x0, "ARMd" at 0x38). BF2 UEFI EFI-stub-boots it directly and
          # CANNOT decompress a gzipped vmlinuz -- a gzip Image makes UEFI reject
          # the "Linux from rshim" boot entry ("Failed to boot", hardware-observed)
          # and fall through to the eMMC OS. So decompress if needed, exactly as
          # NVIDIA bfb-build's create_bfb does (`$CAT vmlinuz > image`, zcat when
          # file(1) reports gzip). Verified on a real BF2: gzip -> Failed to boot;
          # uncompressed -> entry accepted.
          sudo cp "$vmlz" ./kernel.raw
          sudo chown "$(id -u):$(id -g)" ./kernel.raw
          case "$(file --brief --mime-type ./kernel.raw)" in
            application/gzip|application/x-gzip) zcat ./kernel.raw > ./vmlinuz ;;
            *)                                   mv ./kernel.raw ./vmlinuz ;;
          esac
          rm -f ./kernel.raw
          if ! cmp -s <(head -c 2 ./vmlinuz) <(printf 'MZ'); then
            echo "::error::extracted kernel is not an uncompressed arm64 Image (no MZ header); UEFI cannot EFI-stub-boot it"
            file ./vmlinuz; exit 1
          fi

          sq=""
          for f in "$imgdir"*.squashfs; do [ -f "$f" ] && { sq="$f"; break; }; done
          [ -n "$sq" ] || { echo "::error::no *.squashfs under $imgdir"; exit 1; }
          mkdir -p sq
          sudo mount -o loop "$sq" sq
          [ -d "sq/lib/modules/$KVER" ] || { echo "::error::sq/lib/modules/$KVER missing"; sudo ls sq/lib/modules; exit 1; }
          sudo cp -a "sq/lib/modules/$KVER" ./modules-"$KVER"
          sudo umount sq && sudo umount mnt
          sudo qemu-nbd --disconnect /dev/nbd0
          echo "KVER=$KVER" >> "$GITHUB_ENV"

      - name: Build installer initramfs
        if: env.SKIP != '1'
        run: |
          set -euo pipefail
          sudo rebrand-arm64/bfb/create-installer-initramfs.sh \
            --disk "$QCOW" \
            --busybox /usr/bin/busybox \
            --modules-dir "./modules-$KVER" \
            --kver "$KVER" \
            --out installer.cpio.gz

      - name: Pack the BFB
        if: env.SKIP != '1'
        run: |
          set -euo pipefail
          cap=/lib/firmware/mellanox/boot/capsule/boot_update2.cap
          caparg=(); [ -f "$cap" ] && caparg=(--capsule "$cap")
          rebrand-arm64/bfb/make-bfb.sh \
            --mkbfb "$MKBFB" \
            --base-bfb /lib/firmware/mellanox/boot/default.bfb \
            --kernel ./vmlinuz \
            --initramfs installer.cpio.gz \
            "${caparg[@]}" \
            --out "dozenos-${TAG}-bf2.bfb"

      # The .iso and .qcow2 are minisigned by the nightly's publish job; the
      # .bfb was the one asset going out unsigned. Same key, same convention
      # (an empty MINISIGN_PASSWORD is the legitimate no-passphrase case --
      # if the key does need one, minisign fails here rather than silently
      # producing nothing).
      - name: Sign the .bfb
        if: env.SKIP != '1'
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          set -euo pipefail
          [ -n "$MINISIGN_SECRET_KEY" ] || { echo "::error::MINISIGN_SECRET_KEY is unset -- refusing to publish an unsigned .bfb"; exit 1; }
          sudo apt-get install -y minisign
          keydir=$(mktemp -d); chmod 700 "$keydir"
          keyfile="$keydir/minisign.key"
          printf '%s' "$MINISIGN_SECRET_KEY" | base64 -d > "$keyfile"
          chmod 600 "$keyfile"
          minisign -Sm "dozenos-${TAG}-bf2.bfb" -s "$keyfile" <<EOF
          ${MINISIGN_PASSWORD:-}
          EOF
          rm -rf "$keydir"
          test -s "dozenos-${TAG}-bf2.bfb.minisig" \
            || { echo "::error::minisign produced no signature"; exit 1; }
          echo "I: signed dozenos-${TAG}-bf2.bfb"

      - name: Upload the .bfb + signature to the Release
        if: env.SKIP != '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" -R "${{ github.repository }}" \
            "dozenos-${TAG}-bf2.bfb" "dozenos-${TAG}-bf2.bfb.minisig" --clobber
          echo "I: uploaded dozenos-${TAG}-bf2.bfb (+ .minisig) to release $TAG"
